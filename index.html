<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Aphid Attack!</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            background: #376e48;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            display: block;
            max-width: 100%;
            max-height: 100vh;
            image-rendering: pixelated;
        }
    </style>
</head>
<body>
    <canvas id="canvas" width="800" height="600"></canvas>
    <script type="text/javascript">(function(){
    var TXT = {
        PLAYBTN: 'Click to play',
        LOAD:    'Downloading...',
        PARSE:   'Preparing...',
        EXECUTE: 'Starting...',
        DLERROR: 'Error downloading.\nCheck your connection.',
        NOWEBGL: 'WebGL not supported.',
    };
    var canvas = document.getElementById('canvas'), ctx;
    var Msg = function(m) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#aaa';
        for (var i = 0, a = m.split('\n'), n = a.length; i != n; i++)
            ctx.fillText(a[i], canvas.width/2, canvas.height/2-(n-1)*20+10+i*40);
    };
    var Fail = function(m) {
        canvas.outerHTML = '<div style="width:'+canvas.clientWidth+'px;height:'+canvas.clientHeight+'px;background:#000;display:table-cell;vertical-align:middle"><div style="color:#fff;padding:1.5em;max-width:640px;margin:auto;text-align:center">'+TXT.NOWEBGL+(m?'<br><br>'+m:'')+'</div></div>';
    };
    var DoExecute = function() {
        Msg(TXT.EXECUTE);
        Module.canvas = canvas.cloneNode(false);
        Module.canvas.oncontextmenu = function(e) { e.preventDefault() };
        Module.setWindowTitle = function(title) { };
        Module.postRun = function() {
            if (!Module.noExitRuntime) { Fail(); return; }
            canvas.parentNode.replaceChild(Module.canvas, canvas);
            Txt = Msg = ctx = canvas = null;
            Module.canvas.focus();
        };
        setTimeout(function() { Module.run(['/l']); }, 50);
    };
    var DoLoad = function() {
        Msg(TXT.LOAD);
        var xhr = new XMLHttpRequest();
        xhr.open('GET', 'game.js');
        xhr.onprogress = function(e) {
            if (!e.lengthComputable || ctx.pCnt++ < 5) return;
            var x = canvas.width/2-150, y = canvas.height*.6, w = Math.min(e.loaded/e.total,1)*300;
            ctx.fillStyle = '#555'; ctx.fillRect(x-2,y-2,304,28);
            ctx.fillStyle = '#222'; ctx.fillRect(x,y,300,24);
            ctx.fillStyle = '#37b'; ctx.fillRect(x,y,w,24);
        };
        xhr.onerror = xhr.onabort = function() { Msg(TXT.DLERROR); canvas.disabled = false; };
        xhr.onload = function() {
            if (xhr.status != 200) { Msg(TXT.DLERROR); canvas.disabled = false; return; }
            Msg(TXT.PARSE);
            setTimeout(function() {
                window.onerror = function(e,u,l) { Fail(e+'<br>('+u+':'+l+')'); };
                Module = { TOTAL_MEMORY: 1024*1024*24, TOTAL_STACK: 1024*1024*2, currentScriptUrl: '-', preInit: DoExecute };
                var s = document.createElement('script'), d = document.documentElement;
                s.textContent = xhr.response;
                d.appendChild(s); d.removeChild(s);
                xhr = xhr.response = s = s.textContent = null;
            }, 50);
        };
        xhr.send();
    };
    var DoSetup = function() {
        canvas.onclick = function() {
            if (canvas.disabled) return;
            canvas.disabled = true;
            ctx.pCnt = 0;
            DoLoad();
        };
        ctx.fillStyle = '#555';
        ctx.fillRect(canvas.width/2-152, canvas.height/2-52, 304, 104);
        ctx.fillStyle = '#222';
        ctx.fillRect(canvas.width/2-150, canvas.height/2-50, 300, 100);
        ctx.fillStyle = '#aaa';
        ctx.fillText(TXT.PLAYBTN, canvas.width/2, canvas.height/2+10);
    };
    canvas.oncontextmenu = function(e) { e.preventDefault() };
    ctx = canvas.getContext('2d');
    ctx.font = '24px sans-serif';
    ctx.textAlign = 'center';
    DoSetup();
    })()</script>
</body>
</html>
